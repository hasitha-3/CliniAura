services:
  - type: web
    name: cliniaura-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        value: mongodb+srv://alamandahasitha:9502072613@cluster0.kjzfjen.mongodb.net/cliniaura

  - type: web
    name: cliniaura-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          name: cliniaura-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
